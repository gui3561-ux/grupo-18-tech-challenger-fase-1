# Deploy API de Churn Prediction no Azure App Service
# Usa modelo neural_network (PyTorch)

name: Build and deploy Python app to Azure Web App - churn-prediction-api

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'models/**'
      - 'requirements.txt'
      - '.github/workflows/main_churn-prediction-api.yml'
  workflow_dispatch:

env:
  AZUREAPPSERVICE_APPNAME: churn-prediction-api
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar uv
        run: pip install uv

      - name: Validar modelo neural_network
        run: |
          if [ ! -f "models/neural_network_pipeline.pkl" ]; then
            echo "ERRO: Modelo neural_network_pipeline.pkl não encontrado!"
            exit 1
          fi
          echo "Modelo encontrado: $(ls -lh models/neural_network_pipeline.pkl)"

      - name: Instalar dependências
        run: |
          pip install torch==2.5.0+cpu --index-url https://download.pytorch.org/whl/cpu
          uv pip install -r requirements.txt --system --no-deps torch

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            src/
            models/
            requirements.txt
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F3CE170A575B49C5921F1DEE32B61C3D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D55A4B8253464FD4BC2557A4FE60A3C6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BC9FD19C16614EFE82CB085073F1DE68 }}

      - name: Configurar Python Runtime
        run: |
          az webapp config set \
            --name ${{ env.AZUREAPPSERVICE_APPNAME }} \
            --resource-group rg-churn-api \
            --linux-fx-version "PYTHON|${{ env.PYTHON_VERSION }}"

          az webapp config set \
            --name ${{ env.AZUREAPPSERVICE_APPNAME }} \
            --resource-group rg-churn-api \
            --startup-file "gunicorn src.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"

      - name: Limpar deploy anterior
        run: |
          az webapp stop --name ${{ env.AZUREAPPSERVICE_APPNAME }} --resource-group rg-churn-api || true
          sleep 5

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZUREAPPSERVICE_APPNAME }}
          slot-name: 'Production'

      - name: Reiniciar App
        if: success()
        run: |
          az webapp start --name ${{ env.AZUREAPPSERVICE_APPNAME }} --resource-group rg-churn-api

      - name: Configurar Application Insights
        if: success()
        run: |
          az webapp config appsettings set \
            --name ${{ env.AZUREAPPSERVICE_APPNAME }} \
            --resource-group rg-churn-api \
            --settings \
            APPINSIGHTS_ENABLED=true \
            APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}" \
            WEBSITE_PROMETHEUS_SCRAPE_ENDPOINT="/api/v1/metrics/" \
            SCM_DO_BUILD_DURING_DEPLOYMENT=true || true

      - name: Logout do Azure
        if: always()
        run: az logout