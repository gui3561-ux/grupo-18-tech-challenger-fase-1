# Pipeline único: testes em todas as branches / PRs;
# build + deploy só em main, após testes passarem (push ou workflow_dispatch).

name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  WEBAPP_NAME: churn-prediction-api
  IMAGE_NAME: ${{ github.repository }}/churn-api

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Testes (lint, tipos, pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5

      - name: Instalar dependências (runtime + dev)
        run: uv sync --extra dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Rodar testes
        run: uv run pytest -v

  build-and-deploy:
    name: Build e deploy (Azure)
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy no Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          images: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verificar saúde da API
        run: |
          echo "Aguardando inicialização do container (90s)..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ env.WEBAPP_NAME }}.azurewebsites.net/api/v1/health \
            --max-time 30 || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "API disponível em: https://${{ env.WEBAPP_NAME }}.azurewebsites.net"
          else
            echo "API ainda inicializando ou health check retornou $STATUS"
          fi
