# Pipeline único: testes em todas as branches / PRs;
# build + deploy só em main, após testes passarem (push ou workflow_dispatch).

name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  WEBAPP_NAME: churn-prediction-api
  IMAGE_NAME: ${{ github.repository }}/churn-api

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Testes (lint, tipos, pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Instalar uv
        uses: astral-sh/setup-uv@v8

      - name: Instalar dependências (runtime + dev)
        run: uv sync --extra dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Rodar testes
        run: uv run pytest -v

  build-and-deploy:
    name: Build e deploy (Azure)
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login no Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy no Azure Web App
        uses: azure/webapps-deploy@v3.0.8
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          images: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verificar saúde da API
        env:
          HEALTH_URL: https://${{ env.WEBAPP_NAME }}.azurewebsites.net/api/v1/health
        run: |
          set -euo pipefail
          echo "Aguardando /api/v1/health (até ~3 min, intervalo 5s)..."
          for i in $(seq 1 36); do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "$HEALTH_URL" --max-time 20 || echo "000")
            echo "Tentativa ${i}/36: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API disponível em: https://${{ env.WEBAPP_NAME }}.azurewebsites.net"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Health check não retornou 200 após o tempo limite."
          exit 1
