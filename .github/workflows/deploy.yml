name: Deploy FastAPI to Azure App Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar uv
        run: pip install uv

      - name: Instalar dependências da API
        run: uv pip install -r requirements-api.txt --system

      - name: Executar testes
        run: pytest tests/ -v --tb=short || true

      - name: Preparar pacote de deploy (somente código da API)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p deploy_package
          cp -r src deploy_package/
          cp requirements-api.txt deploy_package/requirements.txt
          cp -r .github deploy_package/ 2>/dev/null || true
          cd deploy_package && zip -r ../deploy.zip . && cd ..
          echo "Pacote criado: $(du -sh deploy.zip)"

      - name: Login no Azure
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy para Azure App Service
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: azure/webapps-deploy@v3
        with:
          app-name: "churn-prediction-api"
          package: deploy.zip

      - name: Logout do Azure
        if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: az logout
