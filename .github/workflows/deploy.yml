name: Build e Deploy — Churn Prediction API

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WEBAPP_NAME: churn-prediction-api
  RESOURCE_GROUP: rg-churn-api
  IMAGE_NAME: churn-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login no Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy no Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verificar saúde da API
        run: |
          echo "Aguardando inicialização do container (90s)..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ env.WEBAPP_NAME }}.azurewebsites.net/api/v1/health \
            --max-time 30 || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ API disponível em: https://${{ env.WEBAPP_NAME }}.azurewebsites.net"
          else
            echo "⚠️ API ainda inicializando ou health check retornou $STATUS"
            echo "Verifique: https://${{ env.WEBAPP_NAME }}.azurewebsites.net/api/v1/health"
          fi
