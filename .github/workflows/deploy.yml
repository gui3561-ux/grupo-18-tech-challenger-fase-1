name: Build e Deploy — Churn Prediction API

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WEBAPP_NAME: churn-prediction-api
  RESOURCE_GROUP: rg-churn-api
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/churn-api

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy no Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          images: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verificar saúde da API
        run: |
          echo "Aguardando inicialização do container (90s)..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ env.WEBAPP_NAME }}.azurewebsites.net/api/v1/health \
            --max-time 30 || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "API disponível em: https://${{ env.WEBAPP_NAME }}.azurewebsites.net"
          else
            echo "API ainda inicializando ou health check retornou $STATUS"
          fi
